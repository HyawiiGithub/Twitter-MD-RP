<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Maintenance</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            font-family: Arial, sans-serif;
            color: white;
        }

        /* Animated background */
        .bg {
            position: absolute;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, #ff8800, #ff5500, #ffaa00, #ff6600);
            animation: moveBg 10s linear infinite;
            opacity: 0.15;
        }

        @keyframes moveBg {
            0% { transform: translate(0, 0); }
            50% { transform: translate(-25%, -25%); }
            100% { transform: translate(0, 0); }
        }

        /* Floating particles */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: orange;
            border-radius: 50%;
            animation: float 8s linear infinite;
        }

        @keyframes float {
            from {
                transform: translateY(100vh);
                opacity: 1;
            }
            to {
                transform: translateY(-10vh);
                opacity: 0;
            }
        }

        /* Message */
        .message {
            position: relative;
            text-align: center;
            padding: 20px 40px;
            border: 2px solid orange;
            background: rgba(0,0,0,0.6);
            box-shadow: 0 0 20px orange;
        }

        .message h1 {
            margin: 0;
            font-size: 2.5rem;
            color: orange;
        }

        .message p {
            margin-top: 10px;
            font-size: 1.2rem;
            color: #ddd;
        }
    </style>
</head>
<body>

<div class="bg"></div>

<div class="message">
    <h1>ERROR CODE 9305</h1>
    <p>Website Under Maintenance</p>
</div>

<script>
    // Create particles
    for (let i = 0; i < 50; i++) {
        let p = document.createElement("div");
        p.className = "particle";
        p.style.left = Math.random() * 100 + "vw";
        p.style.animationDuration = (5 + Math.random() * 5) + "s";
        p.style.opacity = Math.random();
        document.body.appendChild(p);
    }
</script>

</body>
</html>
