<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Twitter - where thoughts fly</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <!-- Cropper.js for image cropping -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.js"></script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f8fa;
            --bg-card: #ffffff;
            --bg-hover: #fafbfc;
            --text-primary: #0f1419;
            --text-secondary: #536471;
            --border-color: #eff3f4;
            --border-light: #eef2f5;
            --input-bg: #ffffff;
            --user-panel-bg: #f9f9f9;
            --retweet-bg: #f7f9f9;
            --modal-bg: #ffffff;
            --avatar-bg: #1d9bf0;
            --button-primary: #1d9bf0;
            --button-primary-hover: #0c8ad9;
            --verified-color: #1d9bf0;
            --retweet-color: #00ba7c;
            --like-color: #f91880;
            --webhook-badge-bg: #e8f5fe;
        }
        
        body.dark-mode {
            --bg-primary: #000000;
            --bg-secondary: #000000;
            --bg-card: #000000;
            --bg-hover: #080808;
            --text-primary: #e7e9ea;
            --text-secondary: #71767b;
            --border-color: #2f3336;
            --border-light: #2f3336;
            --input-bg: #000000;
            --user-panel-bg: #080808;
            --retweet-bg: #080808;
            --modal-bg: #000000;
            --avatar-bg: #1d9bf0;
            --button-primary: #1d9bf0;
            --button-primary-hover: #1a8cd8;
            --verified-color: #1d9bf0;
            --retweet-color: #00ba7c;
            --like-color: #f91880;
            --webhook-badge-bg: #1a2a3a;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-secondary); color: var(--text-primary); transition: background 0.2s ease; }
        .app-container { max-width: 700px; margin: 0 auto; background: var(--bg-primary); min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .header { background: var(--bg-primary); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); padding: 14px 20px; position: sticky; top: 0; z-index: 10; display: flex; justify-content: space-between; align-items: center; }
        .logo-area { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .logo-icon { font-size: 28px; color: #1d9bf0; }
        .logo-text { font-weight: 800; font-size: 1.5rem; background: linear-gradient(135deg, #1d9bf0, #0a6cbd); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .dark-mode-toggle { background: var(--webhook-badge-bg); border: none; border-radius: 40px; padding: 8px 12px; cursor: pointer; color: var(--text-primary); font-size: 0.9rem; display: flex; align-items: center; gap: 6px; transition: 0.2s; }
        .dark-mode-toggle:hover { opacity: 0.8; }
        .webhook-badge { background: var(--webhook-badge-bg); border-radius: 20px; padding: 4px 12px; font-size: 0.7rem; color: #1d9bf0; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
        .webhook-badge:hover { background: #d4eaf8; }
        body.dark-mode .webhook-badge:hover { background: #2a3a4a; }
        .webhook-hidden { display: none !important; }
        .auth-buttons { display: flex; gap: 12px; }
        .btn { border: none; padding: 8px 16px; border-radius: 40px; font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: 0.2s; background: transparent; }
        .btn-primary { background: var(--button-primary); color: white; }
        .btn-primary:hover { background: var(--button-primary-hover); }
        .btn-outline { border: 1px solid var(--border-color); color: var(--button-primary); }
        .btn-outline:hover { background: var(--webhook-badge-bg); }
        .user-panel { padding: 12px 20px; background: var(--user-panel-bg); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
        .user-info { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--avatar-bg); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 1.2rem; overflow: hidden; cursor: pointer; transition: 0.2s; border: 2px solid transparent; flex-shrink: 0; }
        .avatar:hover { opacity: 0.8; border-color: var(--button-primary); }
        .avatar-img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-placeholder { font-size: 1.3rem; font-weight: bold; }
        .username-display { font-weight: 700; background: var(--border-light); padding: 4px 12px; border-radius: 40px; font-size: 0.9rem; color: var(--text-primary); }
        .verified-badge { color: var(--verified-color); font-size: 1rem; margin-left: 4px; }
        .edit-username-btn, .edit-avatar-btn { background: none; border: none; color: var(--button-primary); cursor: pointer; font-size: 0.7rem; margin-left: 6px; }
        .compose-area { padding: 16px 20px; border-bottom: 8px solid var(--border-color); }
        .compose-input { width: 100%; border: none; outline: none; font-size: 1.1rem; font-family: inherit; resize: none; padding: 12px 0; min-height: 80px; background: var(--input-bg); color: var(--text-primary); }
        .compose-input::placeholder { color: var(--text-secondary); }
        .compose-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
        .post-actions { display: flex; gap: 16px; }
        .icon-btn { background: none; border: none; font-size: 1.3rem; color: var(--button-primary); cursor: pointer; }
        .tweet-btn { background: var(--button-primary); color: white; border: none; border-radius: 40px; padding: 8px 20px; font-weight: 700; cursor: pointer; }
        .feed { padding: 0 0 70px 0; }
        .tweet-card { border-bottom: 1px solid var(--border-color); padding: 16px 20px; transition: background 0.1s; background: var(--bg-card); }
        .tweet-card:hover { background: var(--bg-hover); }
        .tweet-header { display: flex; gap: 12px; margin-bottom: 8px; }
        .tweet-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--avatar-bg); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; flex-shrink: 0; overflow: hidden; }
        .tweet-avatar-img { width: 100%; height: 100%; object-fit: cover; }
        .tweet-name-area { flex: 1; }
        .tweet-name-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .tweet-username { font-weight: 700; color: var(--text-primary); }
        .verified-icon { color: var(--verified-color); font-size: 0.85rem; }
        .tweet-time { color: var(--text-secondary); font-size: 0.8rem; }
        .retweet-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; margin-left: 56px; color: var(--retweet-color); font-size: 0.75rem; }
        .tweet-content { margin: 8px 0 12px 56px; font-size: 0.95rem; line-height: 1.4; white-space: pre-wrap; word-break: break-word; color: var(--text-primary); }
        .tweet-content a { color: var(--button-primary); text-decoration: none; }
        .tweet-media { margin: 12px 0 12px 56px; max-width: 100%; border-radius: 20px; overflow: hidden; cursor: pointer; }
        .tweet-media img { max-width: 100%; max-height: 400px; border-radius: 20px; border: 1px solid var(--border-color); display: block; }
        .engagement-bar { display: flex; justify-content: space-between; margin-top: 12px; margin-left: 56px; max-width: 450px; color: var(--text-secondary); }
        .eng-item { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; cursor: pointer; transition: 0.1s; }
        .eng-item i { font-size: 1rem; }
        .eng-item:hover { color: var(--button-primary); }
        .original-tweet-ref { background: var(--retweet-bg); border-radius: 16px; padding: 12px; margin-top: 8px; margin-left: 56px; border-left: 3px solid var(--retweet-color); font-size: 0.85rem; color: var(--text-secondary); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 1000; }
        .modal-card { background: var(--modal-bg); border-radius: 28px; max-width: 550px; width: 90%; padding: 24px; max-height: 90vh; overflow-y: auto; color: var(--text-primary); }
        .modal-card input, .modal-card textarea { width: 100%; padding: 12px; margin: 12px 0; border: 1px solid var(--border-color); border-radius: 16px; font-size: 0.95rem; font-family: inherit; background: var(--input-bg); color: var(--text-primary); }
        .crop-container { max-width: 100%; max-height: 400px; margin: 16px 0; }
        .avatar-preview { display: flex; justify-content: center; gap: 16px; margin: 16px 0; }
        .avatar-preview-img { width: 80px; height: 80px; border-radius: 50%; background-size: cover; background-position: center; border: 3px solid var(--button-primary); }
        .comments-list { font-size: 0.9rem; margin-top: 16px; max-height: 400px; overflow-y: auto; }
        .single-comment { padding: 12px 0; border-bottom: 1px solid var(--border-color); display: flex; gap: 12px; }
        .comment-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--avatar-bg); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 0.9rem; overflow: hidden; flex-shrink: 0; }
        .comment-avatar-img { width: 100%; height: 100%; object-fit: cover; }
        .comment-content { flex: 1; }
        .comment-username { font-weight: 700; font-size: 0.85rem; }
        .comment-text { font-size: 0.85rem; margin-top: 4px; color: var(--text-primary); }
        .comment-time { font-size: 0.7rem; color: var(--text-secondary); margin-left: 8px; }
        .webhook-preview { background: var(--retweet-bg); border-radius: 16px; padding: 12px; margin-top: 12px; font-size: 0.8rem; color: var(--text-secondary); }
        footer { text-align: center; font-size: 0.75rem; color: var(--text-secondary); padding: 20px; border-top: 1px solid var(--border-color); }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--button-primary); color: white; padding: 10px 20px; border-radius: 40px; font-size: 0.85rem; z-index: 1100; animation: fadeInOut 2s ease; }
        @keyframes fadeInOut { 0% { opacity: 0; transform: translateX(-50%) translateY(20px); } 15% { opacity: 1; } 85% { opacity: 1; } 100% { opacity: 0; transform: translateX(-50%) translateY(20px); } }
        .button-group { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; flex-wrap: wrap; }
        .image-preview-area { margin-top: 12px; position: relative; display: inline-block; }
        .image-preview-area img { max-width: 100px; max-height: 100px; border-radius: 16px; object-fit: cover; }
        .remove-image-btn { position: absolute; top: -8px; right: -8px; background: #ef4444; color: white; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; }
        .webhook-status { font-size: 0.65rem; color: var(--text-secondary); margin-left: 8px; }
    </style>
</head>
<body>
<div class="app-container" id="appRoot">
    <div class="header">
        <div class="logo-area">
            <i class="fab fa-twitter logo-icon"></i>
            <span class="logo-text">Twitter</span>
            <div id="webhookBadge" class="webhook-badge webhook-hidden"><i class="fas fa-webhook"></i> Webhook Config</div>
            <span id="webhookStatus" class="webhook-status"></span>
        </div>
        <div style="display: flex; gap: 8px; align-items: center;">
            <button id="darkModeToggle" class="dark-mode-toggle"><i class="fas fa-moon"></i> Dark</button>
            <div id="authWidget"></div>
        </div>
    </div>
    <div id="mainContent"></div>
    <footer>Credits to Hyawii — inspired by the birdsite ✨</footer>
</div>

<script>
    // Dark Mode Handling
    function initDarkMode() {
        const savedMode = localStorage.getItem('twitter_dark_mode');
        if (savedMode === 'dark') {
            document.body.classList.add('dark-mode');
            document.getElementById('darkModeToggle').innerHTML = '<i class="fas fa-sun"></i> Light';
        } else {
            document.getElementById('darkModeToggle').innerHTML = '<i class="fas fa-moon"></i> Dark';
        }
    }
    
    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('twitter_dark_mode', isDark ? 'dark' : 'light');
        if (isDark) {
            document.getElementById('darkModeToggle').innerHTML = '<i class="fas fa-sun"></i> Light';
        } else {
            document.getElementById('darkModeToggle').innerHTML = '<i class="fas fa-moon"></i> Dark';
        }
    }
    
    const AUTHORIZED_IP = "109.137.203.189";
    
    const firebaseConfig = {
        apiKey: "AIzaSyDEGeA0zbFdDXSoFj5J9arqF-j9Dnx_J0I",
        authDomain: "twitska.firebaseapp.com",
        databaseURL: "https://twitska-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "twitska",
        storageBucket: "twitska.firebasestorage.app",
        messagingSenderId: "741872015483",
        appId: "1:741872015483:web:f4e2f4019501d404cbaade",
        measurementId: "G-KZQJNFTJD4"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    const storage = firebase.storage();

    let webhookUrl = localStorage.getItem('twitter_webhook') || '';
    let currentUser = null;
    let currentUserProfile = null;
    let tweetsRef = db.ref('tweets');
    let usersRef = db.ref('users');
    let commentsRef = db.ref('comments');
    let likesRef = db.ref('likes');
    let viewsRef = db.ref('views');
    let retweetsRef = db.ref('retweets');
    let isAuthorizedIP = false;
    let currentCropper = null;
    let realtimeListenerActive = false;

    function generateId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 8); }
    function formatUsername(username) { return username ? '@' + username : '@user'; }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    async function verifyAndAuthorizeIP() {
        try {
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            if (data.ip === AUTHORIZED_IP) {
                isAuthorizedIP = true;
                const btn = document.getElementById('webhookBadge');
                if (btn) btn.classList.remove('webhook-hidden');
            }
        } catch (error) { isAuthorizedIP = false; }
    }

    function showToast(message) { const toast = document.createElement('div'); toast.className = 'toast'; toast.textContent = message; document.body.appendChild(toast); setTimeout(() => toast.remove(), 2000); }

    async function uploadImage(file) { 
        try {
            const fileExt = file.name.split('.').pop();
            const fileName = `${generateId()}.${fileExt}`;
            const storageRef = storage.ref(`tweet_images/${fileName}`); 
            const uploadTask = await storageRef.put(file);
            const downloadUrl = await storageRef.getDownloadURL();
            return downloadUrl;
        } catch (error) {
            console.error('Upload error:', error);
            showToast('❌ Image upload failed!');
            return null;
        }
    }

    async function showAvatarUploadModal() {
        if (!currentUser) return;
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.style.display = 'flex';
        modal.innerHTML = `<div class="modal-card"><h3><i class="fas fa-camera"></i> Profile Picture</h3><p>Upload and crop a square image</p><input type="file" id="avatarFileInput" accept="image/*"><div id="cropContainer" class="crop-container" style="display:none"><img id="cropImage" style="max-width:100%"></div><div id="previewContainer" class="avatar-preview" style="display:none"><div class="avatar-preview-img" id="previewCircle"></div></div><div class="button-group"><button id="cropSaveBtn" class="btn-primary btn" style="display:none">Save</button><button id="removeAvatarBtn" class="btn-outline btn">Remove</button><button id="closeAvatarModal" class="btn-outline btn">Cancel</button></div></div>`;
        document.body.appendChild(modal);
        
        const fileInput = document.getElementById('avatarFileInput');
        const cropContainer = document.getElementById('cropContainer');
        const cropImage = document.getElementById('cropImage');
        const previewContainer = document.getElementById('previewContainer');
        const cropSaveBtn = document.getElementById('cropSaveBtn');
        
        fileInput.onchange = (e) => {
            if (e.target.files.length) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    cropImage.src = event.target.result;
                    cropContainer.style.display = 'block';
                    if (currentCropper) currentCropper.destroy();
                    currentCropper = new Cropper(cropImage, { aspectRatio: 1, viewMode: 1, dragMode: 'move', cropBoxMovable: true, cropBoxResizable: true, background: false, ready: function() { previewContainer.style.display = 'flex'; updatePreview(); } });
                    cropSaveBtn.style.display = 'inline-block';
                };
                reader.readAsDataURL(e.target.files[0]);
            }
        };
        function updatePreview() { if (currentCropper) { const canvas = currentCropper.getCroppedCanvas(); document.getElementById('previewCircle').style.backgroundImage = `url(${canvas.toDataURL()})`; document.getElementById('previewCircle').style.backgroundSize = 'cover'; } }
        cropSaveBtn.onclick = async () => { if (currentCropper) { const canvas = currentCropper.getCroppedCanvas(); const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.9)); const storageRef = storage.ref(`profile_pics/${currentUser.uid}_${Date.now()}.jpg`); await storageRef.put(blob); const url = await storageRef.getDownloadURL(); await usersRef.child(currentUser.uid).update({ profilePicUrl: url }); currentUserProfile.profilePicUrl = url; updateAuthUI(); renderFeed(); showToast('✅ Profile picture updated!'); modal.remove(); } };
        document.getElementById('removeAvatarBtn').onclick = async () => { await usersRef.child(currentUser.uid).update({ profilePicUrl: null }); currentUserProfile.profilePicUrl = null; updateAuthUI(); renderFeed(); showToast('Removed'); modal.remove(); };
        document.getElementById('closeAvatarModal').onclick = () => { if (currentCropper) currentCropper.destroy(); modal.remove(); };
        modal.onclick = (e) => { if(e.target === modal) { if (currentCropper) currentCropper.destroy(); modal.remove(); } };
    }

    async function createRetweet(originalTweetId, originalTweetData, originalUsername, comment = "") {
        const retweetId = generateId();
        await tweetsRef.child(retweetId).set({ uid: currentUser.uid, content: comment, imageUrl: null, timestamp: Date.now(), isRetweet: true, originalTweetId: originalTweetId, originalAuthor: originalUsername, originalContent: originalTweetData.content || "", originalImageUrl: originalTweetData.imageUrl || null });
        await retweetsRef.child(originalTweetId).child('count').transaction(c => (c || 0) + 1);
        showToast('🔁 Retweeted!');
    }

    async function toggleRetweet(originalTweetId, originalTweetData, originalUsername) {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.style.display = 'flex';
        modal.innerHTML = `<div class="modal-card"><h3><i class="fas fa-retweet"></i> Retweet</h3><p>Retweeting @${escapeHtml(originalUsername)}</p><textarea id="retweetComment" placeholder="Add a comment (optional)" rows="2"></textarea><div class="button-group"><button id="confirmRetweetBtn" class="btn-primary btn">Retweet</button><button id="cancelRetweetBtn" class="btn-outline btn">Cancel</button></div></div>`;
        document.body.appendChild(modal);
        document.getElementById('confirmRetweetBtn').onclick = async () => { const comment = document.getElementById('retweetComment').value.trim(); await createRetweet(originalTweetId, originalTweetData, originalUsername, comment); modal.remove(); };
        document.getElementById('cancelRetweetBtn').onclick = () => modal.remove();
        modal.onclick = (e) => { if(e.target === modal) modal.remove(); };
    }

    function showImageZoom(imageUrl) { const modal = document.createElement('div'); modal.className = 'modal'; modal.style.display = 'flex'; modal.innerHTML = `<div class="modal-card" style="background:transparent; padding:0; max-width:90vw;"><img src="${imageUrl}" style="max-width:90vw; max-height:90vh; border-radius:20px;"></div>`; document.body.appendChild(modal); modal.onclick = () => modal.remove(); }

    function registerView(tweetId) { if (!currentUser) return; viewsRef.child(tweetId).child(currentUser.uid).once('value', snap => { if (!snap.exists()) { snap.ref.set(true); viewsRef.child(tweetId).child('count').transaction(c => (c || 0) + 1); } }); }
    async function getViewCount(tweetId) { const snap = await viewsRef.child(tweetId).child('count').once('value'); return snap.val() || 0; }
    async function getLikeInfo(tweetId, userId) { const likeSnap = await likesRef.child(tweetId).child(userId).once('value'); const liked = likeSnap.exists(); const countSnap = await likesRef.child(tweetId).child('count').once('value'); return { liked, count: countSnap.val() || 0 }; }
    async function toggleLike(tweetId, userId) { const likeNode = likesRef.child(tweetId).child(userId); const countNode = likesRef.child(tweetId).child('count'); const snap = await likeNode.once('value'); if (snap.exists()) { await likeNode.remove(); await countNode.transaction(c => (c || 1) - 1); } else { await likeNode.set(true); await countNode.transaction(c => (c || 0) + 1); } }
    async function getCommentCount(tweetId) { const snap = await commentsRef.child(tweetId).once('value'); return snap.val() ? Object.keys(snap.val()).length : 0; }
    
    async function showCommentsModal(tweetId, originalUsername, originalContent) {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.style.display = 'flex';
        modal.innerHTML = `<div class="modal-card">
            <h3><i class="far fa-comment"></i> Replies to @${escapeHtml(originalUsername)}</h3>
            <div style="background: var(--retweet-bg); padding: 12px; border-radius: 16px; margin-bottom: 16px; border-left: 3px solid var(--button-primary);">
                <div style="font-weight: 600;">Original post:</div>
                <div style="margin-top: 4px; color: var(--text-secondary);">${escapeHtml(originalContent?.substring(0, 150) || '')}</div>
            </div>
            <div id="commentsListFull" class="comments-list">Loading comments...</div>
            <div style="margin-top: 16px; border-top: 1px solid var(--border-color); padding-top: 16px;">
                <textarea id="replyTextFull" placeholder="Write a reply..." rows="2" style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 16px; background: var(--input-bg); color: var(--text-primary);"></textarea>
                <div class="button-group" style="margin-top: 8px;">
                    <button id="submitReplyFullBtn" class="btn-primary btn">Post Reply</button>
                    <button id="closeCommentsModal" class="btn-outline btn">Close</button>
                </div>
            </div>
        </div>`;
        document.body.appendChild(modal);
        
        const loadComments = async () => {
            const snap = await commentsRef.child(tweetId).once('value');
            const all = snap.val() || {};
            const commentsListDiv = document.getElementById('commentsListFull');
            if (!commentsListDiv) return;
            
            if (Object.keys(all).length === 0) {
                commentsListDiv.innerHTML = '<div style="text-align:center; padding:20px; color: var(--text-secondary);">No replies yet. Be the first to reply!</div>';
                return;
            }
            
            let html = '';
            const sortedComments = Object.entries(all).sort((a, b) => b[1].timestamp - a[1].timestamp);
            
            for (let [cid, comment] of sortedComments) {
                const userSnap = await usersRef.child(comment.uid).once('value');
                const userProfile = userSnap.val() || { username: 'anonymous', profilePicUrl: null };
                const username = userProfile.username;
                const profilePic = userProfile.profilePicUrl;
                const timeAgo = new Date(comment.timestamp).toLocaleString();
                const avatarHtml = profilePic 
                    ? `<img class="comment-avatar-img" src="${profilePic}" style="width:100%; height:100%; object-fit:cover;">` 
                    : `<span style="font-size:0.8rem;">${username.charAt(0).toUpperCase()}</span>`;
                
                html += `<div class="single-comment">
                    <div class="comment-avatar">${avatarHtml}</div>
                    <div class="comment-content">
                        <div>
                            <span class="comment-username">${escapeHtml(formatUsername(username))}</span>
                            <span class="comment-time">${escapeHtml(timeAgo)}</span>
                        </div>
                        <div class="comment-text">${escapeHtml(comment.text)}</div>
                    </div>
                </div>`;
            }
            commentsListDiv.innerHTML = html;
        };
        
        await loadComments();
        
        document.getElementById('submitReplyFullBtn').onclick = async () => {
            const text = document.getElementById('replyTextFull').value.trim();
            if (!text) { showToast('Reply cannot be empty'); return; }
            await commentsRef.child(tweetId).child(generateId()).set({ uid: currentUser.uid, text: text, timestamp: Date.now() });
            showToast('💬 Reply posted!');
            document.getElementById('replyTextFull').value = '';
            await loadComments();
        };
        
        document.getElementById('closeCommentsModal').onclick = () => modal.remove();
        modal.onclick = (e) => { if(e.target === modal) modal.remove(); };
    }

        document.body.appendChild(modal);
        const urlInput = document.getElementById('webhookUrlInput');
document.getElementById('saveWebhookBtn').onclick = async () => { 
    webhookUrl = urlInput.value.trim(); 
    localStorage.setItem('twitter_webhook', webhookUrl); 
    document.getElementById('webhookStatus').innerHTML = webhookUrl ? '✓ Webhook active' : '';

};
        document.getElementById('testWebhookBtn').onclick = async () => { const testUrl = urlInput.value.trim(); if (!testUrl) { showToast('Enter URL first'); return; } try { await fetch(testUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ embeds: [{ title: "✅ Webhook Test", description: "Your Twitter webhook is configured correctly! The Cloud Function will now send all posts 24/7.", color: 0x1D9BF0, footer: { text: "Made by Hyawii" } }] }) }); showToast('📡 Test sent!'); } catch(e) { showToast('❌ Test failed'); } };
        document.getElementById('clearWebhookBtn').onclick = () => { urlInput.value = ''; webhookUrl = ''; localStorage.removeItem('twitter_webhook'); document.getElementById('webhookStatus').innerHTML = ''; showToast('Webhook cleared'); modal.remove(); };
        document.getElementById('closeWebhookBtn').onclick = () => modal.remove();
        modal.onclick = (e) => { if(e.target === modal) modal.remove(); };
    }

    // REAL-TIME FEED UPDATE - NO REFRESH NEEDED!
    function setupRealtimeFeed() {
        if (realtimeListenerActive) return;
        realtimeListenerActive = true;
        
        // Listen for new tweets
        tweetsRef.orderByChild('timestamp').startAfter(Date.now() - 10000).on('child_added', async (snapshot) => {
            const tweet = snapshot.val();
            const tweetId = snapshot.key;
            // Check if this tweet is already in the feed (by checking timestamp recency)
            const existingCards = document.querySelectorAll(`.tweet-card[data-tweet-id="${tweetId}"]`);
            if (existingCards.length === 0 && tweet.timestamp > Date.now() - 5000) {
                // Add to feed dynamically
                const feedDiv = document.getElementById('feedList');
                if (feedDiv) {
                    const userSnap = await usersRef.child(tweet.uid).once('value');
                    const profile = userSnap.val() || { username: 'twitizen', profilePicUrl: null };
                    const username = profile.username;
                    const profilePic = profile.profilePicUrl;
                    const timeAgo = new Date(tweet.timestamp).toLocaleString();
                    const avatarHtml = profilePic ? `<img class="tweet-avatar-img" src="${profilePic}">` : `<span>${username.charAt(0).toUpperCase()}</span>`;
                    const processedContent = escapeHtml(tweet.content || '').replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
                    
                    const newTweetHtml = `<div class="tweet-card" data-tweet-id="${tweetId}" style="animation: fadeInOut 0.5s ease;">
                        <div class="tweet-header">
                            <div class="tweet-avatar">${avatarHtml}</div>
                            <div class="tweet-name-area">
                                <div class="tweet-name-row">
                                    <span class="tweet-username">${escapeHtml(formatUsername(username))}</span>
                                    <i class="fas fa-check-circle verified-icon"></i>
                                    <span class="tweet-time">${escapeHtml(timeAgo)}</span>
                                </div>
                            </div>
                        </div>
                        <div class="tweet-content">${processedContent}</div>
                        ${tweet.imageUrl ? `<div class="tweet-media" onclick="showImageZoom('${tweet.imageUrl}')"><img src="${tweet.imageUrl}" loading="lazy"></div>` : ''}
                        <div class="engagement-bar">
                            <div class="eng-item comment-eng" data-tweetid="${tweetId}" data-username="${escapeHtml(username)}" data-content="${escapeHtml(tweet.content || '').substring(0, 150)}"><i class="far fa-comment"></i> 0</div>
                            <div class="eng-item retweet-eng" data-tweetid="${tweetId}" data-original-id="${tweetId}" data-original-username="${escapeHtml(username)}" data-original-content="${escapeHtml(tweet.content || '')}"><i class="fas fa-retweet"></i> 0</div>
                            <div class="eng-item like-eng" data-tweetid="${tweetId}"><i class="far fa-heart"></i> 0</div>
                            <div class="eng-item"><i class="far fa-eye"></i> 0</div>
                        </div>
                    </div>`;
                    
                    feedDiv.insertAdjacentHTML('afterbegin', newTweetHtml);
                    showToast('✨ New tweet appeared!');
                    
                    // Re-attach event listeners
                    attachEventListeners();
                }
            }
        });
    }
    
    function attachEventListeners() {
        document.querySelectorAll('.comment-eng').forEach(el => {
            el.removeEventListener('click', window.commentHandler);
            window.commentHandler = (e) => {
                e.stopPropagation();
                const tid = el.getAttribute('data-tweetid');
                const username = el.getAttribute('data-username');
                const content = el.getAttribute('data-content');
                showCommentsModal(tid, username, content);
            };
            el.addEventListener('click', window.commentHandler);
        });
        
        document.querySelectorAll('.like-eng').forEach(el => {
            el.removeEventListener('click', window.likeHandler);
            window.likeHandler = async (e) => {
                e.stopPropagation();
                const tid = el.getAttribute('data-tweetid');
                await toggleLike(tid, currentUser.uid);
                renderFeed();
            };
            el.addEventListener('click', window.likeHandler);
        });
        
        document.querySelectorAll('.retweet-eng').forEach(el => {
            el.removeEventListener('click', window.retweetHandler);
            window.retweetHandler = async (e) => {
                e.stopPropagation();
                const originalId = el.getAttribute('data-original-id');
                const originalUsername = el.getAttribute('data-original-username');
                const originalContent = el.getAttribute('data-original-content');
                const originalTweet = { content: originalContent, imageUrl: null };
                await toggleRetweet(originalId, originalTweet, originalUsername);
                renderFeed();
            };
            el.addEventListener('click', window.retweetHandler);
        });
    }

    async function renderFeed() {
        const container = document.getElementById('mainContent');
        if (!container) return;
        if (!currentUser) { container.innerHTML = `<div style="padding:40px; text-align:center"><i class="fab fa-twitter" style="font-size:48px;"></i><h3>Join Twitter</h3><p>Sign in to see chirps</p></div>`; return; }
        container.innerHTML = `<div class="compose-area"><textarea id="tweetText" class="compose-input" placeholder="What's happening?"></textarea><div id="tweetImagePreview" class="image-preview-area" style="display:none"><img id="previewImg"><div class="remove-image-btn" id="removeImageBtn">×</div></div><div class="compose-footer"><div class="post-actions"><input type="file" id="imageUpload" accept="image/*" style="display:none"><button id="attachImageBtn" class="icon-btn"><i class="fas fa-image"></i></button></div><button id="publishTweetBtn" class="tweet-btn">Post</button></div></div><div class="feed" id="feedList">Loading...</div>`;
        
        let selectedFile = null;
        const imgInput = document.getElementById('imageUpload');
        const attachBtn = document.getElementById('attachImageBtn');
        const previewArea = document.getElementById('tweetImagePreview');
        const previewImg = document.getElementById('previewImg');
        const removeBtn = document.getElementById('removeImageBtn');
        attachBtn.onclick = () => imgInput.click();
        imgInput.onchange = (e) => { if (e.target.files.length) { selectedFile = e.target.files[0]; const reader = new FileReader(); reader.onload = (ev) => { previewImg.src = ev.target.result; previewArea.style.display = 'block'; }; reader.readAsDataURL(selectedFile); } };
        removeBtn.onclick = () => { selectedFile = null; previewArea.style.display = 'none'; imgInput.value = ''; };
        
        document.getElementById('publishTweetBtn').onclick = async () => {
            const content = document.getElementById('tweetText').value.trim();
            if (!content && !selectedFile) return;
            let imageUrl = null;
            if (selectedFile) {
                imageUrl = await uploadImage(selectedFile);
                if (!imageUrl) return;
            }
            const tweetId = generateId();
            await tweetsRef.child(tweetId).set({ uid: currentUser.uid, content: content, imageUrl: imageUrl, timestamp: Date.now(), isRetweet: false });
            document.getElementById('tweetText').value = ''; selectedFile = null; previewArea.style.display = 'none'; imgInput.value = ''; showToast('✨ Posted!');
        };
        
        const snapshot = await tweetsRef.orderByChild('timestamp').once('value');
        const tweets = snapshot.val() || {};
        const tweetsArray = Object.entries(tweets).sort((a,b) => b[1].timestamp - a[1].timestamp);
        const feedDiv = document.getElementById('feedList');
        if(tweetsArray.length === 0) feedDiv.innerHTML = '<div style="padding:40px;text-align:center">No posts yet.</div>';
        else {
            let feedHtml = '';
            for (let [tid, tweet] of tweetsArray) {
                const userSnap = await usersRef.child(tweet.uid).once('value');
                const profile = userSnap.val() || { username: 'twitizen', profilePicUrl: null };
                const username = profile.username;
                const profilePic = profile.profilePicUrl;
                const timeAgo = new Date(tweet.timestamp).toLocaleString();
                const { liked, count: likeCount } = await getLikeInfo(tid, currentUser.uid);
                const commentCount = await getCommentCount(tid);
                const viewCount = await getViewCount(tid);
                let processedContent = escapeHtml(tweet.content || '');
                processedContent = processedContent.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
                const avatarHtml = profilePic ? `<img class="tweet-avatar-img" src="${profilePic}">` : `<span>${username.charAt(0).toUpperCase()}</span>`;
                feedHtml += `<div class="tweet-card" data-tweet-id="${tid}">`;
                if (tweet.isRetweet) {
                    feedHtml += `<div class="retweet-header"><i class="fas fa-retweet"></i> ${escapeHtml(formatUsername(username))} retweeted</div>`;
                    feedHtml += `<div class="tweet-header"><div class="tweet-avatar">${avatarHtml}</div><div class="tweet-name-area"><div class="tweet-name-row"><span class="tweet-username">${escapeHtml(formatUsername(username))}</span><i class="fas fa-check-circle verified-icon"></i><span class="tweet-time">${escapeHtml(timeAgo)}</span></div></div></div>`;
                    feedHtml += `<div class="tweet-content">${processedContent || '<span style="color:var(--text-secondary)">(No additional comment)</span>'}</div>`;
                    feedHtml += `<div class="original-tweet-ref"><i class="fas fa-retweet" style="color:var(--retweet-color)"></i> Retweeted from @${escapeHtml(tweet.originalAuthor)}<br>${escapeHtml(tweet.originalContent?.substring(0, 150))}${tweet.originalImageUrl ? '<br><img src="'+tweet.originalImageUrl+'" style="max-width:100%; max-height:150px; border-radius:12px; margin-top:8px;">' : ''}</div>`;
                } else {
                    feedHtml += `<div class="tweet-header"><div class="tweet-avatar">${avatarHtml}</div><div class="tweet-name-area"><div class="tweet-name-row"><span class="tweet-username">${escapeHtml(formatUsername(username))}</span><i class="fas fa-check-circle verified-icon"></i><span class="tweet-time">${escapeHtml(timeAgo)}</span></div></div></div>`;
                    feedHtml += `<div class="tweet-content">${processedContent}</div>`;
                    if (tweet.imageUrl) feedHtml += `<div class="tweet-media" onclick="showImageZoom('${tweet.imageUrl}')"><img src="${tweet.imageUrl}" loading="lazy"></div>`;
                }
                feedHtml += `<div class="engagement-bar">
                    <div class="eng-item comment-eng" data-tweetid="${tid}" data-username="${escapeHtml(username)}" data-content="${escapeHtml(tweet.content || '').substring(0, 150)}"><i class="far fa-comment"></i> ${commentCount}</div>
                    <div class="eng-item retweet-eng" data-tweetid="${tid}" data-original-id="${tweet.isRetweet ? tweet.originalTweetId : tid}" data-original-username="${tweet.isRetweet ? tweet.originalAuthor : username}" data-original-content="${escapeHtml((tweet.isRetweet ? tweet.originalContent : tweet.content) || '')}"><i class="fas fa-retweet"></i> 0</div>
                    <div class="eng-item like-eng" data-tweetid="${tid}"><i class="${liked ? 'fas fa-heart' : 'far fa-heart'}" style="color:${liked ? 'var(--like-color)' : ''}"></i> ${likeCount}</div>
                    <div class="eng-item"><i class="far fa-eye"></i> ${viewCount}</div>
                </div></div>`;
            }
            feedDiv.innerHTML = feedHtml;
            attachEventListeners();
            for(let [tid] of tweetsArray) registerView(tid);
        }
        setupRealtimeFeed();
    }

    async function showEditUsernameModal() {
        if(!currentUser) return;
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.style.display = 'flex';
        modal.innerHTML = `<div class="modal-card"><h3>Change username</h3><input type="text" id="newUsername" placeholder="Username" value="${currentUserProfile?.username || ''}"><div class="button-group"><button id="saveUsernameBtn" class="btn-primary btn">Save</button><button id="cancelUsernameBtn" class="btn-outline btn">Cancel</button></div><p>Your handle will appear as @username</p></div>`;
        document.body.appendChild(modal);
        document.getElementById('saveUsernameBtn').onclick = async () => { let newName = document.getElementById('newUsername').value.trim(); if(newName.length < 2) newName = "twitizen"; newName = newName.replace(/^@/, ''); await usersRef.child(currentUser.uid).update({ username: newName }); currentUserProfile.username = newName; updateAuthUI(); modal.remove(); };
        document.getElementById('cancelUsernameBtn').onclick = () => modal.remove();
        modal.onclick = (e) => { if(e.target === modal) modal.remove(); };
    }

    function updateAuthUI() {
        const authDiv = document.getElementById('authWidget');
        if(!authDiv) return;
        if(!currentUser) {
            authDiv.innerHTML = `<div class="auth-buttons"><button id="signInBtn" class="btn btn-primary">Sign in</button><button id="signUpBtn" class="btn btn-outline">Sign up</button></div>`;
            document.getElementById('signInBtn')?.addEventListener('click', () => showAuthModal('login'));
            document.getElementById('signUpBtn')?.addEventListener('click', () => showAuthModal('register'));
            return;
        }
        const usernameDisplay = currentUserProfile?.username || currentUser.email?.split('@')[0] || 'User';
        const displayHandle = formatUsername(usernameDisplay);
        const profilePic = currentUserProfile?.profilePicUrl;
        const avatarHtml = profilePic ? `<img class="avatar-img" src="${profilePic}">` : `<span class="avatar-placeholder">${usernameDisplay.charAt(0).toUpperCase()}</span>`;
        authDiv.innerHTML = `<div class="user-panel"><div class="user-info"><div class="avatar" id="avatarClickable">${avatarHtml}</div><div><span class="username-display">${escapeHtml(displayHandle)} <i class="fas fa-check-circle verified-badge"></i></span><button id="editUsernameBtn" class="edit-username-btn"><i class="fas fa-pen"></i> edit</button><button id="editAvatarBtn" class="edit-avatar-btn"><i class="fas fa-camera"></i> pic</button></div></div><button id="logoutBtn" class="btn-outline btn">Sign out</button></div>`;
        document.getElementById('avatarClickable')?.addEventListener('click', showAvatarUploadModal);
        document.getElementById('editAvatarBtn')?.addEventListener('click', showAvatarUploadModal);
        document.getElementById('logoutBtn')?.addEventListener('click', async () => { await auth.signOut(); currentUser = null; currentUserProfile = null; updateAuthUI(); });
        document.getElementById('editUsernameBtn')?.addEventListener('click', showEditUsernameModal);
        renderFeed();
    }

    async function loadUserProfile(uid) {
        const snap = await usersRef.child(uid).once('value');
        if(snap.exists()) return snap.val();
        const defaultName = 'user_' + uid.slice(0,4);
        const profile = { username: defaultName, profilePicUrl: null };
        await usersRef.child(uid).set(profile);
        return profile;
    }

    auth.onAuthStateChanged(async (user) => { if(user) { currentUser = user; currentUserProfile = await loadUserProfile(user.uid); updateAuthUI(); } else { currentUser = null; currentUserProfile = null; updateAuthUI(); } });

    function showAuthModal(mode) {
        const modalDiv = document.createElement('div');
        modalDiv.className = 'modal';
        modalDiv.style.display = 'flex';
        const isLogin = mode === 'login';
        modalDiv.innerHTML = `<div class="modal-card"><h2>${isLogin ? 'Sign in' : 'Create account'}</h2><input type="email" id="authEmail" placeholder="Email"><input type="password" id="authPassword" placeholder="Password"><div class="button-group"><button id="authSubmitBtn" class="btn-primary btn">${isLogin ? 'Login' : 'Sign up'}</button><button id="closeAuthModal" class="btn-outline btn">Cancel</button></div></div>`;
        document.body.appendChild(modalDiv);
        document.getElementById('authSubmitBtn').onclick = async () => { const email = modalDiv.querySelector('#authEmail').value; const pwd = modalDiv.querySelector('#authPassword').value; try { if(isLogin) await auth.signInWithEmailAndPassword(email, pwd); else await auth.createUserWithEmailAndPassword(email, pwd); modalDiv.remove(); } catch(err) { alert("Error: "+err.message); } };
        modalDiv.querySelector('#closeAuthModal').onclick = () => modalDiv.remove();
        modalDiv.onclick = (e) => { if(e.target === modalDiv) modalDiv.remove(); };
    }

    initDarkMode();
    document.getElementById('darkModeToggle').addEventListener('click', toggleDarkMode);
    verifyAndAuthorizeIP().then(() => { const webhookElem = document.getElementById('webhookBadge'); if (webhookElem) webhookElem.addEventListener('click', showWebhookModal); if (webhookUrl) document.getElementById('webhookStatus').innerHTML = '✓ Webhook active'; });
    document.getElementById('mainContent').innerHTML = '<div style="padding:40px;text-align:center">Loading Twitter...</div>';
    window.showImageZoom = showImageZoom;
</script>
