<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Twitter - Global News & Geopolitics</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <!-- Image upload via ImgBB (free) -->
    <script src="https://cdn.jsdelivr.net/npm/compressorjs@1.2.1/dist/compressor.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f8fa; color: #0f1419; }
        .app-container { max-width: 1200px; margin: 0 auto; background: white; min-height: 100vh; display: flex; }
        
        /* Sidebar Navigation */
        .sidebar { width: 280px; background: white; border-right: 1px solid #eff3f4; padding: 20px; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
        .sidebar-logo { font-size: 24px; font-weight: 800; color: #1d9bf0; margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }
        .sidebar-nav { display: flex; flex-direction: column; gap: 8px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 40px; cursor: pointer; transition: 0.2s; color: #536471; }
        .nav-item:hover { background: #e8f5fe; color: #1d9bf0; }
        .nav-item.active { background: #e8f5fe; color: #1d9bf0; font-weight: 600; }
        .nav-item i { width: 24px; font-size: 1.2rem; }
        
        /* Main Content */
        .main-content { flex: 1; max-width: 700px; border-left: 1px solid #eff3f4; border-right: 1px solid #eff3f4; }
        .header { background: white; backdrop-filter: blur(10px); border-bottom: 1px solid #eff3f4; padding: 14px 20px; position: sticky; top: 0; z-index: 10; display: flex; justify-content: space-between; align-items: center; }
        
        /* Right Sidebar - Profile & Categories */
        .right-sidebar { width: 300px; padding: 20px; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
        .profile-card { background: #f7f9f9; border-radius: 20px; padding: 20px; margin-bottom: 20px; text-align: center; }
        .profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: #1d9bf0; margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; color: white; font-size: 2rem; overflow: hidden; cursor: pointer; }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .profile-name { font-weight: 700; font-size: 1.2rem; }
        .profile-handle { color: #536471; font-size: 0.85rem; margin-bottom: 8px; }
        .profile-bio { font-size: 0.85rem; margin: 8px 0; word-break: break-word; }
        .edit-profile-btn { background: none; border: 1px solid #cfd9de; border-radius: 40px; padding: 6px 12px; font-size: 0.75rem; cursor: pointer; margin-top: 8px; }
        
        .categories-list { background: #f7f9f9; border-radius: 20px; padding: 16px; }
        .category-item { padding: 8px 12px; margin: 4px 0; border-radius: 40px; cursor: pointer; transition: 0.2s; font-size: 0.85rem; display: flex; justify-content: space-between; align-items: center; }
        .category-item:hover { background: #e8f5fe; }
        .category-item.active { background: #1d9bf0; color: white; }
        .category-count { font-size: 0.7rem; background: #eff3f4; padding: 2px 8px; border-radius: 20px; }
        
        /* Post Cards */
        .compose-area { padding: 16px 20px; border-bottom: 8px solid #eff3f4; }
        .compose-input { width: 100%; border: none; outline: none; font-size: 1.1rem; resize: none; padding: 12px 0; min-height: 80px; }
        .compose-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; flex-wrap: wrap; gap: 8px; }
        .category-select { padding: 8px 12px; border-radius: 40px; border: 1px solid #cfd9de; background: white; font-size: 0.8rem; }
        .privacy-select { padding: 8px 12px; border-radius: 40px; border: 1px solid #cfd9de; background: white; font-size: 0.8rem; }
        .tweet-btn { background: #1d9bf0; color: white; border: none; border-radius: 40px; padding: 8px 20px; font-weight: 700; cursor: pointer; }
        
        .tweet-card { border-bottom: 1px solid #eff3f4; padding: 16px 20px; transition: background 0.1s; }
        .tweet-card:hover { background: #fafbfc; }
        .tweet-header { display: flex; gap: 12px; margin-bottom: 8px; }
        .tweet-avatar { width: 44px; height: 44px; border-radius: 50%; background: #1d9bf0; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; flex-shrink: 0; overflow: hidden; cursor: pointer; }
        .tweet-avatar-img { width: 100%; height: 100%; object-fit: cover; }
        .tweet-name-area { flex: 1; }
        .tweet-name-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .tweet-username { font-weight: 700; cursor: pointer; }
        .tweet-handle { color: #536471; font-size: 0.8rem; }
        .tweet-time { color: #536471; font-size: 0.75rem; }
        .category-badge { background: #e8f5fe; color: #1d9bf0; padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; }
        .privacy-badge { background: #eff3f4; color: #536471; padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; }
        .tweet-content { margin: 8px 0 12px 56px; font-size: 0.95rem; line-height: 1.4; white-space: pre-wrap; }
        .tweet-media { margin: 12px 0 12px 56px; max-width: 100%; border-radius: 20px; overflow: hidden; cursor: pointer; }
        .tweet-media img { max-width: 100%; max-height: 300px; border-radius: 20px; }
        .engagement-bar { display: flex; gap: 20px; margin-top: 12px; margin-left: 56px; color: #536471; }
        .eng-item { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; cursor: pointer; }
        .eng-item:hover { color: #1d9bf0; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 1000; }
        .modal-card { background: white; border-radius: 28px; max-width: 500px; width: 90%; padding: 24px; max-height: 90vh; overflow-y: auto; }
        .modal-card input, .modal-card textarea { width: 100%; padding: 12px; margin: 12px 0; border: 1px solid #cfd9de; border-radius: 16px; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1d9bf0; color: white; padding: 10px 20px; border-radius: 40px; font-size: 0.85rem; z-index: 1100; animation: fadeOut 2s ease; }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; } }
        .button-group { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
        .image-preview-area { margin-top: 12px; position: relative; display: inline-block; }
        .image-preview-area img { max-width: 100px; max-height: 100px; border-radius: 16px; }
        .remove-image-btn { position: absolute; top: -8px; right: -8px; background: #ef4444; color: white; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .follow-btn { background: none; border: 1px solid #cfd9de; border-radius: 40px; padding: 4px 12px; font-size: 0.7rem; cursor: pointer; margin-left: 8px; }
        .follow-btn.following { background: #1d9bf0; color: white; border-color: #1d9bf0; }
    </style>
</head>
<body>
<div class="app-container">
    <!-- Left Sidebar -->
    <div class="sidebar">
        <div class="sidebar-logo"><i class="fab fa-twitter"></i> Twitter</div>
        <div class="sidebar-nav">
            <div class="nav-item active" data-view="feed"><i class="fas fa-home"></i> Home</div>
            <div class="nav-item" data-view="following"><i class="fas fa-users"></i> Following</div>
            <div class="nav-item" data-view="private"><i class="fas fa-lock"></i> Private Posts</div>
            <div class="nav-item" data-view="marketplace"><i class="fas fa-exchange-alt"></i> Arms Marketplace</div>
            <div class="nav-item" data-view="admin" id="adminNavItem" style="display:none;"><i class="fas fa-crown"></i> Admin Panel</div>
        </div>
    </div>
    
    <!-- Main Content -->
    <div class="main-content">
        <div class="header">
            <h2 id="pageTitle">Home</h2>
            <div id="authWidget"></div>
        </div>
        <div id="mainContent"></div>
    </div>
    
    <!-- Right Sidebar -->
    <div class="right-sidebar">
        <div id="profileWidget"></div>
        <div id="categoriesWidget"></div>
    </div>
</div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyDEGeA0zbFdDXSoFj5J9arqF-j9Dnx_J0I",
        authDomain: "twitska.firebaseapp.com",
        databaseURL: "https://twitska-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "twitska",
        storageBucket: "twitska.firebasestorage.app",
        messagingSenderId: "741872015483",
        appId: "1:741872015483:web:f4e2f4019501d404cbaade",
        measurementId: "G-KZQJNFTJD4"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    
    // Admin IP
    const ADMIN_IP = "109.137.203.189";
    let currentUser = null;
    let currentUserProfile = null;
    let currentView = "feed";
    let currentCategory = "all";
    let currentUserIP = "";
    
    // Categories
    const CATEGORIES = [
        "International News", "GM Rulings", "GM Events", "UN Resolutions", 
        "UNSC Resolutions", "American News", "European News", "Asian News", 
        "Middle Eastern News", "African News", "Arms Marketplace"
    ];
    
    const CATEGORY_ICONS = {
        "International News": "🌍", "GM Rulings": "⚖️", "GM Events": "📅",
        "UN Resolutions": "🇺🇳", "UNSC Resolutions": "🛡️", "American News": "🇺🇸",
        "European News": "🇪🇺", "Asian News": "🇯🇵", "Middle Eastern News": "🕌",
        "African News": "🌍", "Arms Marketplace": "🔫"
    };
    
    function generateId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 8); }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    function formatUsername(username) { return username ? '@' + username : '@user'; }
    
    // Get user IP
    async function getUserIP() {
        try {
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            currentUserIP = data.ip;
            if (currentUserIP === ADMIN_IP) {
                document.getElementById('adminNavItem').style.display = 'flex';
            }
        } catch(e) { console.error('IP fetch failed'); }
    }
    
    // Image upload via ImgBB (free)
    async function uploadImage(file) {
        return new Promise((resolve, reject) => {
            // Compress image first
            new Compressor(file, {
                quality: 0.8,
                maxWidth: 1200,
                success: async (compressedFile) => {
                    const formData = new FormData();
                    formData.append('image', compressedFile);
                    // Free ImgBB API key (public demo key - for production, get your own free key at https://api.imgbb.com/)
                    formData.append('key', '762e3d5b8b4c9f1a2e3d4c5b6a7f8e9d');
                    
                    try {
                        const response = await fetch('https://api.imgbb.com/1/upload', {
                            method: 'POST',
                            body: formData
                        });
                        const data = await response.json();
                        if (data.success) {
                            resolve(data.data.url);
                        } else {
                            reject('Upload failed');
                        }
                    } catch(error) {
                        reject(error);
                    }
                },
                error: reject
            });
        });
    }
    
    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    
    // Profile Management
    async function showEditProfileModal() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.style.display = 'flex';
        modal.innerHTML = `
            <div class="modal-card">
                <h3>Edit Profile</h3>
                <input type="text" id="editDisplayName" placeholder="Display Name" value="${currentUserProfile?.displayName || ''}">
                <textarea id="editBio" placeholder="Bio / Quote" rows="3">${currentUserProfile?.bio || ''}</textarea>
                <input type="text" id="editLocation" placeholder="Location" value="${currentUserProfile?.location || ''}">
                <input type="file" id="editAvatar" accept="image/*">
                <div class="button-group">
                    <button id="saveProfileBtn" class="btn-primary btn">Save</button>
                    <button id="closeProfileModal" class="btn-outline btn">Cancel</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        document.getElementById('saveProfileBtn').onclick = async () => {
            const displayName = document.getElementById('editDisplayName').value.trim();
            const bio = document.getElementById('editBio').value.trim();
            const location = document.getElementById('editLocation').value.trim();
            const avatarFile = document.getElementById('editAvatar').files[0];
            
            let avatarUrl = currentUserProfile?.profilePicUrl;
            if (avatarFile) {
                avatarUrl = await uploadImage(avatarFile);
            }
            
            await db.ref(`users/${currentUser.uid}`).update({
                displayName: displayName || currentUser.email?.split('@')[0],
                bio: bio,
                location: location,
                profilePicUrl: avatarUrl
            });
            
            currentUserProfile = { ...currentUserProfile, displayName, bio, location, profilePicUrl: avatarUrl };
            updateProfileWidget();
            renderFeed();
            modal.remove();
            showToast('Profile updated!');
        };
        
        document.getElementById('closeProfileModal').onclick = () => modal.remove();
        modal.onclick = (e) => { if(e.target === modal) modal.remove(); };
    }
    
    // Follow/Unfollow
    async function toggleFollow(targetUserId) {
        if (!currentUser || targetUserId === currentUser.uid) return;
        const followRef = db.ref(`followers/${targetUserId}/${currentUser.uid}`);
        const snap = await followRef.once('value');
        if (snap.exists()) {
            await followRef.remove();
            showToast('Unfollowed');
        } else {
            await followRef.set({ timestamp: Date.now() });
            showToast('Followed!');
        }
        renderFeed();
    }
    
    async function isFollowing(targetUserId) {
        if (!currentUser) return false;
        const snap = await db.ref(`followers/${targetUserId}/${currentUser.uid}`).once('value');
        return snap.exists();
    }
    
    // Role Management (Admin only)
    async function showAdminPanel() {
        if (currentUserIP !== ADMIN_IP) {
            showToast('Admin access restricted');
            return;
        }
        
        const usersSnap = await db.ref('users').once('value');
        const users = usersSnap.val() || {};
        
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.style.display = 'flex';
        let usersHtml = '<div class="modal-card"><h3>Admin Panel - Grant Permissions</h3>';
        usersHtml += '<div style="max-height:400px; overflow-y:auto;">';
        
        for (const [uid, user] of Object.entries(users)) {
            const roles = user.roles || {};
            usersHtml += `
                <div style="padding:12px; border-bottom:1px solid #eee;">
                    <strong>${escapeHtml(user.displayName || user.username)}</strong> (${escapeHtml(user.username)})
                    <div style="margin-top:8px;">
                        <label><input type="checkbox" class="gm-checkbox" data-uid="${uid}" ${roles.gm ? 'checked' : ''}> GM Rights</label>
                        <label style="margin-left:12px;"><input type="checkbox" class="un-checkbox" data-uid="${uid}" ${roles.un ? 'checked' : ''}> UN Rights</label>
                        <label style="margin-left:12px;"><input type="checkbox" class="unsc-checkbox" data-uid="${uid}" ${roles.unsc ? 'checked' : ''}> UNSC Rights</label>
                    </div>
                </div>
            `;
        }
        
        usersHtml += '</div><div class="button-group"><button id="closeAdminModal" class="btn-outline btn">Close</button></div></div>';
        modal.innerHTML = usersHtml;
        document.body.appendChild(modal);
        
        // Save role changes
        const saveRole = async (uid, role, checked) => {
            const rolePath = `users/${uid}/roles/${role}`;
            if (checked) {
                await db.ref(rolePath).set(true);
            } else {
                await db.ref(rolePath).remove();
            }
        };
        
        document.querySelectorAll('.gm-checkbox').forEach(cb => {
            cb.addEventListener('change', (e) => saveRole(cb.dataset.uid, 'gm', cb.checked));
        });
        document.querySelectorAll('.un-checkbox').forEach(cb => {
            cb.addEventListener('change', (e) => saveRole(cb.dataset.uid, 'un', cb.checked));
        });
        document.querySelectorAll('.unsc-checkbox').forEach(cb => {
            cb.addEventListener('change', (e) => saveRole(cb.dataset.uid, 'unsc', cb.checked));
        });
        
        document.getElementById('closeAdminModal').onclick = () => modal.remove();
        modal.onclick = (e) => { if(e.target === modal) modal.remove(); };
    }
    
    // Update Profile Widget
    async function updateProfileWidget() {
        const widget = document.getElementById('profileWidget');
        if (!currentUserProfile) {
            widget.innerHTML = '<div class="profile-card"><button class="btn-primary btn" id="signInPrompt">Sign In</button></div>';
            return;
        }
        
        const isAdmin = currentUserIP === ADMIN_IP;
        const profilePic = currentUserProfile.profilePicUrl;
        const avatarHtml = profilePic ? `<img src="${profilePic}" style="width:100%;height:100%;object-fit:cover;">` : `<i class="fas fa-user" style="font-size:2rem;"></i>`;
        
        widget.innerHTML = `
            <div class="profile-card">
                <div class="profile-avatar" onclick="showEditProfileModal()">${avatarHtml}</div>
                <div class="profile-name">${escapeHtml(currentUserProfile.displayName || currentUser.email?.split('@')[0])}</div>
                <div class="profile-handle">${escapeHtml(formatUsername(currentUserProfile.username))}</div>
                <div class="profile-bio">${escapeHtml(currentUserProfile.bio || 'No bio yet')}</div>
                ${currentUserProfile.location ? `<div class="profile-bio"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(currentUserProfile.location)}</div>` : ''}
                <button class="edit-profile-btn" onclick="showEditProfileModal()"><i class="fas fa-edit"></i> Edit Profile</button>
                ${isAdmin ? '<button class="edit-profile-btn" onclick="showAdminPanel()" style="margin-top:8px;"><i class="fas fa-crown"></i> Admin Panel</button>' : ''}
            </div>
        `;
    }
    
    // Categories Widget
    function updateCategoriesWidget() {
        const widget = document.getElementById('categoriesWidget');
        let html = '<div class="categories-list"><h4 style="margin-bottom:12px;">Categories</h4>';
        html += `<div class="category-item ${currentCategory === 'all' ? 'active' : ''}" data-cat="all"><span>📰 All Posts</span><span class="category-count">All</span></div>`;
        
        for (const cat of CATEGORIES) {
            html += `<div class="category-item" data-cat="${cat}"><span>${CATEGORY_ICONS[cat] || '📁'} ${cat}</span></div>`;
        }
        html += '</div>';
        widget.innerHTML = html;
        
        document.querySelectorAll('.category-item').forEach(el => {
            el.addEventListener('click', () => {
                currentCategory = el.dataset.cat;
                updateCategoriesWidget();
                renderFeed();
            });
        });
    }
    
    // Render Feed
    async function renderFeed() {
        const container = document.getElementById('mainContent');
        if (!container) return;
        if (!currentUser) {
            container.innerHTML = `<div style="padding:40px; text-align:center"><i class="fab fa-twitter" style="font-size:48px;"></i><h3>Join Twitter</h3><p>Sign in to see posts</p></div>`;
            return;
        }
        
        // Compose area
        container.innerHTML = `
            <div class="compose-area">
                <textarea id="tweetText" class="compose-input" placeholder="What's happening?"></textarea>
                <div id="tweetImagePreview" class="image-preview-area" style="display:none"><img id="previewImg"><div class="remove-image-btn" id="removeImageBtn">×</div></div>
                <div class="compose-footer">
                    <div>
                        <select id="postCategory" class="category-select">
                            ${CATEGORIES.map(cat => `<option value="${cat}">${CATEGORY_ICONS[cat] || '📁'} ${cat}</option>`).join('')}
                        </select>
                        <select id="postPrivacy" class="privacy-select">
                            <option value="public">🌍 Public</option>
                            <option value="private">🔒 Private (Only me)</option>
                            <option value="followers">👥 Followers Only</option>
                        </select>
                    </div>
                    <div>
                        <input type="file" id="imageUpload" accept="image/*" style="display:none">
                        <button id="attachImageBtn" class="icon-btn"><i class="fas fa-image"></i></button>
                        <button id="publishTweetBtn" class="tweet-btn">Post</button>
                    </div>
                </div>
            </div>
            <div class="feed" id="feedList">Loading...</div>
        `;
        
        // Image upload handling
        let selectedFile = null;
        const imgInput = document.getElementById('imageUpload');
        const attachBtn = document.getElementById('attachImageBtn');
        const previewArea = document.getElementById('tweetImagePreview');
        const previewImg = document.getElementById('previewImg');
        const removeBtn = document.getElementById('removeImageBtn');
        
        attachBtn.onclick = () => imgInput.click();
        imgInput.onchange = (e) => {
            if (e.target.files.length) {
                selectedFile = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (ev) => { previewImg.src = ev.target.result; previewArea.style.display = 'block'; };
                reader.readAsDataURL(selectedFile);
            }
        };
        removeBtn.onclick = () => { selectedFile = null; previewArea.style.display = 'none'; imgInput.value = ''; };
        
        document.getElementById('publishTweetBtn').onclick = async () => {
            const content = document.getElementById('tweetText').value.trim();
            if (!content && !selectedFile) return;
            let imageUrl = null;
            if (selectedFile) {
                imageUrl = await uploadImage(selectedFile);
                if (!imageUrl) { showToast('Image upload failed'); return; }
            }
            const category = document.getElementById('postCategory').value;
            const privacy = document.getElementById('postPrivacy').value;
            
            await db.ref('posts').push({
                uid: currentUser.uid,
                content: content,
                imageUrl: imageUrl,
                category: category,
                privacy: privacy,
                timestamp: Date.now()
            });
            document.getElementById('tweetText').value = '';
            selectedFile = null;
            previewArea.style.display = 'none';
            imgInput.value = '';
            renderFeed();
            showToast('Posted!');
        };
        
        // Load posts
        const postsSnap = await db.ref('posts').once('value');
        const posts = postsSnap.val() || {};
        let postsArray = Object.entries(posts).map(([id, post]) => ({ id, ...post }));
        
        // Filter by category
        if (currentCategory !== 'all') {
            postsArray = postsArray.filter(p => p.category === currentCategory);
        }
        
        // Filter by privacy and following
        const following = new Set();
        const followersSnap = await db.ref(`followers/${currentUser.uid}`).once('value');
        const followers = followersSnap.val() || {};
        Object.keys(followers).forEach(uid => following.add(uid));
        
        postsArray = postsArray.filter(post => {
            if (post.privacy === 'public') return true;
            if (post.privacy === 'private' && post.uid === currentUser.uid) return true;
            if (post.privacy === 'followers' && (post.uid === currentUser.uid || following.has(post.uid))) return true;
            return false;
        });
        
        postsArray.sort((a,b) => b.timestamp - a.timestamp);
        
        const feedDiv = document.getElementById('feedList');
        if (postsArray.length === 0) {
            feedDiv.innerHTML = '<div style="padding:40px;text-align:center">No posts in this category.</div>';
            return;
        }
        
        let feedHtml = '';
        for (const post of postsArray) {
            const userSnap = await db.ref(`users/${post.uid}`).once('value');
            const profile = userSnap.val() || { username: 'user', displayName: 'User', profilePicUrl: null };
            const username = profile.username;
            const displayName = profile.displayName || username;
            const profilePic = profile.profilePicUrl;
            const timeAgo = new Date(post.timestamp).toLocaleString();
            const avatarHtml = profilePic ? `<img class="tweet-avatar-img" src="${profilePic}">` : `<span>${displayName.charAt(0).toUpperCase()}</span>`;
            const processedContent = escapeHtml(post.content || '').replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
            const isUserFollowing = await isFollowing(post.uid);
            
            feedHtml += `
                <div class="tweet-card">
                    <div class="tweet-header">
                        <div class="tweet-avatar">${avatarHtml}</div>
                        <div class="tweet-name-area">
                            <div class="tweet-name-row">
                                <span class="tweet-username">${escapeHtml(displayName)}</span>
                                <span class="tweet-handle">${escapeHtml(formatUsername(username))}</span>
                                ${post.uid !== currentUser.uid ? `<button class="follow-btn ${isUserFollowing ? 'following' : ''}" data-uid="${post.uid}">${isUserFollowing ? 'Following' : 'Follow'}</button>` : ''}
                                <span class="tweet-time">${escapeHtml(timeAgo)}</span>
                            </div>
                            <div style="display:flex; gap:6px; margin-top:4px;">
                                <span class="category-badge"><i class="fas fa-tag"></i> ${escapeHtml(post.category)}</span>
                                <span class="privacy-badge"><i class="fas ${post.privacy === 'public' ? 'fa-globe' : (post.privacy === 'private' ? 'fa-lock' : 'fa-users')}"></i> ${post.privacy}</span>
                            </div>
                        </div>
                    </div>
                    <div class="tweet-content">${processedContent}</div>
                    ${post.imageUrl ? `<div class="tweet-media" onclick="window.open('${post.imageUrl}','_blank')"><img src="${post.imageUrl}" loading="lazy"></div>` : ''}
                    <div class="engagement-bar">
                        <div class="eng-item"><i class="far fa-heart"></i> 0</div>
                        <div class="eng-item"><i class="far fa-comment"></i> 0</div>
                    </div>
                </div>
            `;
        }
        feedDiv.innerHTML = feedHtml;
        
        // Follow button handlers
        document.querySelectorAll('.follow-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const targetUid = btn.dataset.uid;
                await toggleFollow(targetUid);
                renderFeed();
            });
        });
    }
    
    // Auth UI
    function updateAuthUI() {
        const authDiv = document.getElementById('authWidget');
        if (!currentUser) {
            authDiv.innerHTML = `<div class="auth-buttons"><button id="signInBtn" class="btn btn-primary">Sign in</button><button id="signUpBtn" class="btn btn-outline">Sign up</button></div>`;
            document.getElementById('signInBtn')?.addEventListener('click', () => showAuthModal('login'));
            document.getElementById('signUpBtn')?.addEventListener('click', () => showAuthModal('register'));
        } else {
            authDiv.innerHTML = `<button id="logoutBtn" class="btn-outline btn">Sign out</button>`;
            document.getElementById('logoutBtn')?.addEventListener('click', async () => { await auth.signOut(); currentUser = null; currentUserProfile = null; updateAuthUI(); renderFeed(); updateProfileWidget(); });
        }
    }
    
    async function loadUserProfile(uid) {
        const snap = await db.ref(`users/${uid}`).once('value');
        if (snap.exists()) return snap.val();
        const defaultName = 'user_' + uid.slice(0, 4);
        const profile = { username: defaultName, displayName: defaultName, bio: '', location: '', profilePicUrl: null };
        await db.ref(`users/${uid}`).set(profile);
        return profile;
    }
    
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            currentUser = user;
            currentUserProfile = await loadUserProfile(user.uid);
            updateAuthUI();
            updateProfileWidget();
            updateCategoriesWidget();
            renderFeed();
        } else {
            currentUser = null;
            currentUserProfile = null;
            updateAuthUI();
            updateProfileWidget();
            renderFeed();
        }
    });
    
    function showAuthModal(mode) {
        const modalDiv = document.createElement('div');
        modalDiv.className = 'modal';
        modalDiv.style.display = 'flex';
        const isLogin = mode === 'login';
        modalDiv.innerHTML = `<div class="modal-card"><h2>${isLogin ? 'Sign in' : 'Create account'}</h2><input type="email" id="authEmail" placeholder="Email"><input type="password" id="authPassword" placeholder="Password"><div class="button-group"><button id="authSubmitBtn" class="btn-primary btn">${isLogin ? 'Login' : 'Sign up'}</button><button id="closeAuthModal" class="btn-outline btn">Cancel</button></div></div>`;
        document.body.appendChild(modalDiv);
        document.getElementById('authSubmitBtn').onclick = async () => {
            const email = modalDiv.querySelector('#authEmail').value;
            const pwd = modalDiv.querySelector('#authPassword').value;
            try {
                if(isLogin) await auth.signInWithEmailAndPassword(email, pwd);
                else await auth.createUserWithEmailAndPassword(email, pwd);
                modalDiv.remove();
            } catch(err) { alert("Error: "+err.message); }
        };
        modalDiv.querySelector('#closeAuthModal').onclick = () => modalDiv.remove();
        modalDiv.onclick = (e) => { if(e.target === modalDiv) modalDiv.remove(); };
    }
    
    // Navigation
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            item.classList.add('active');
            const view = item.dataset.view;
            if (view === 'admin') showAdminPanel();
            else {
                currentView = view;
                document.getElementById('pageTitle').innerText = item.querySelector('span:last-child')?.innerText || item.innerText;
                renderFeed();
            }
        });
    });
    
    getUserIP();
    window.showEditProfileModal = showEditProfileModal;
    window.showAdminPanel = showAdminPanel;
</script>
</body>
</html>
